<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Virtual Notebooks</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <style>
        .font {
            font-family: 'Segoe UI', sans-serif;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }


        .login-bg {
            background-image: url(../assets/images/bg.jpg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-body {
            display: flex;
            background-color: #e0e0e0;
            height: 100vh;
        }


        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        .logo-placeholder {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .logo {
            width: 150px;


        }


        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #f0f0f0;
        }

        .btn-login {
            background: #00d2d3;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-cancel {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            margin-left: 10px;
        }


        .sidebar {
            width: 200px;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar-logo {
            font-size: 30px;
            margin-bottom: 30px;
            text-align: center;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 15px 10px;
            font-size: 14px;
            opacity: 0.7;
        }

        .sidebar li.active {
            opacity: 1;
            border-left: 3px solid #00d2d3;
        }


        .content {
            flex-grow: 1;
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .subject-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .badge {
            background: #333;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .progress-bar {
            height: 5px;
            background: #ddd;
            margin-top: 15px;
            border-radius: 5px;
        }
    </style>

    <body class="login-bg">
        <div class="login-card">

            <img src="../assets/images/LOGICAM.png" class="logo">
            <h1>Login</h1>

            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter here">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="********">
            </div>

            <div class="options">
                <label><input type="checkbox"> Stay logged in</label>
                <p class="sub-text">Your session will stay active on this device.</p>
            </div>

            <div class="button-row">
                <button onclick="handleLogin()" class="btn-login">Login</button>
                <button class="btn-cancel">Cancel</button>
            </div>

            <a href="#" class="forgot-link">Forgot username / password?</a>
            <p id="message" style="color: red; font-size: 12px; margin-top: 10px;"></p>
        </div>

        <script>
            let attempts = 0;

            function handleLogin() {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                const msg = document.getElementById('message');

                if (attempts >= 3) {
                    msg.innerText = "Account locked: Too many failed attempts.";
                    return;
                }

                if (user === "user1034" && pass === "123") {
                    // Success: Redirect to task
                    window.location.href = "task.html";
                } else {
                    attempts++;
                    if (attempts >= 3) {
                        msg.innerText = "Too many attempts. Access denied.";
                    } else {
                        msg.innerText = `Invalid credentials. ${3 - attempts} attempts remaining.`;
                    }
                }
            }
        </script>
    </body>
</body>

</html>

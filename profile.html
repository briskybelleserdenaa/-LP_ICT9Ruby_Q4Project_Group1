<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Portal </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <style>
        .navbar {
            width: 200px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;

            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px;
        }

        .logo {
            width: 60px;
            margin-bottom: 20px;

        }

        .rectangle {
            background-color: #f7d152;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .nav-link {
            color: white;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .logo {
            width: 38px;
        }

        .book-btn {
            background: #ffc003;
            color: #000;
        }

        .book-btn:hover {
            background: #e0a800;
        }

        .create-btn {
            background: #1a73e8;
            color: white;
        }

        .create-btn:hover {
            background: #0d5bd3;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            padding: 20px;

        }

        .form-card {
            display: flex;
            flex-direction: row;
            width: 850px;
            max-width: 100%;
            background: rgb(238, 235, 235);
            backdrop-filter: blur(20px);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            ;
            color: #333;
            transition: transform 0.3s;
        }

        .left {
            width: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
        }

        .profile-pic {
            width: 130px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .file-input::file-selector-button {
            color: #ffffff;
            display: block;
            margin: 10px auto;
            text-align: center
        }


        .file-input {
            color: transparent;
        }

        .right {
            width: 60%;
            padding-left: 30px;
            padding-right: 30px;
            padding-bottom: 30px;
        }

        .notice {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid rgba(175, 177, 177, 0.086);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 5px rgb(217, 255, 255);
        }


        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }


        .create-account {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 6px;
            background: rgb(221, 224, 224);
            color: rgb(255, 255, 255);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .create-account:hover {
            background: black;
        }

        .cancel {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 6px;
            background: #e1e1e1;
            cursor: pointer;
            transition: 0.3s;
        }

        .cancel:hover {
            background: #aaa;
        }

        .gradient-border {
            padding: 3px;
            border-radius: 12px;
            background: linear-gradient(90deg, #ff8e4d, #ffe17c);
        }

        .change-btn {
            width: 100%;
            padding: 7px;
            background: #4187d1;
            color: white;
            border-radius: 10px;
            border: none;

        }

        body {
            min-height: 100vh;
            background-image: url("bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        @media (max-width: 768px) {
            .form-card {
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
            }
        }
    </style>
    </head>

    <body>
        <nav class="navbar navbar-dark rectangle">
            <div class="container-fluid flex-column align-items-start">

                <img src="LOGICAM.png" class="logo">

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">DASHBOARD</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="notebooks.html">NOTEBOOKS</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="task.html">TASKS</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">PROFILE</a>
                    </li>`
                </ul>

                <li class="nav-item">
                    <button type="button" class="btn btn-warning btn-sm mt-2 w-100" onclick="location.href='index.html'">
                        LOG OUT
                    </button>
                </li>
            </div>
        </nav>

        <div class="container">
            <div class="gradient-border">
                <div class="form-card">

                    <div class="left">
                        <img id="profilePreview" src="pfp.png" class="profile-pic">
                        <input type="file" class="file-input" accept="image/*" onchange="previewImage(event)">
                    </div>

                    <div class="right">
                        <div id="formNotice" class="notice" style="display:none;"></div>
                        <h2 class="title"> STUDENT INFORMATION </h2>

                        <input type="text" placeholder="Name" id="fname">
                        <input type="number" placeholder="Age" id="age">

                        <div class="row">
                            <div class="col">
                                <input type="text" placeholder="Student ID">
                            </div>
                            <div class="col">
                                <input type="email" placeholder="Email" id="email">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <input type="password" placeholder="Current Password" id="CurrentPassword">
                            </div>
                            <div class="col">
                                <input type="password" placeholder="Confirm Password" id="ConfirmPassword">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col">
                                <input type="password" placeholder="New Password" id="NewPassword">
                            </div>

                            <button class="change-btn" onclick="showNotice()">
                                CHANGE PASSWORD
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <script>

            let savedPassword = "Guest123";
            function previewImage(event) {
                const input = event.target;
                const preview = document.getElementById("profilePreview");

                if (input.files && input.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        preview.src = e.target.result;
                    }
                    reader.readAsDataURL(input.files[0]);
                }
            }
        </script>

        <script>
            function showNotice() {

                const notice = document.getElementById("formNotice");
                const current = document.getElementById("CurrentPassword").value;
                const Newpass = document.getElementById("NewPassword").value;
                const confirm = document.getElementById("ConfirmPassword").value;

                notice.style.display = "block";

                if (current !== savedPassword) {
                    notice.innerHTML = "Current password is INCORRECT";
                    notice.style.color = "red";
                }
                else if (Newpass.length < 6) {
                    notice.innerHTML = "Password must be at least 6 characters";
                    notice.style.color = "orange";
                }
                else if (Newpass !== confirm) {
                    notice.innerHTML = "Passwords do not match";
                    notice.style.color = "red";
                }
                else {
                    savedPassword = Newpass;
                    notice.innerHTML = "Password changed successfully! Awesome";
                    notice.style.color = "green";
                }

            }



        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>

</html>
